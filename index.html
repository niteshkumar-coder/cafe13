<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe 13 Patna</title>
    <script>
      // Patch for "Cannot set property fetch of #<Window> which has only a getter"
      // This must run before any other scripts.
      (function() {
        try {
          var _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { 
              console.log('fetch property was set');
              _fetch = v; 
            },
            configurable: true,
            enumerable: true
          });
          console.log('Successfully initialized writable fetch proxy');
        } catch (e) {
          console.warn('window.fetch is read-only and cannot be redefined:', e);
        }

        // Global error suppressor for this specific error
        window.addEventListener('error', function(event) {
          if (event.message && (
            event.message.includes('Cannot set property fetch') || 
            event.message.includes('only a getter')
          )) {
            event.preventDefault();
            console.warn('Suppressed fetch property assignment error');
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
