<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe 13 Patna</title>
    <script>
      // Patch for "Cannot set property fetch of #<Window> which has only a getter"
      // This must run before any other scripts.
      (function() {
        try {
          const originalFetch = window.fetch;
          
          // Try to redefine the property to be writable and configurable
          try {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            // If defineProperty fails, try to delete and re-assign
            try {
              delete window.fetch;
              window.fetch = originalFetch;
            } catch (e2) {
              console.warn('Could not make window.fetch writable:', e2);
            }
          }
          
          console.log('Successfully patched window.fetch to be writable in index.html');
        } catch (e) {
          console.warn('Could not patch window.fetch in index.html:', e);
        }

        // Global error suppressor for this specific error
        window.addEventListener('error', function(event) {
          if (event.message && (
            event.message.includes('Cannot set property fetch') || 
            event.message.includes('only a getter')
          )) {
            event.preventDefault();
            console.warn('Suppressed fetch property assignment error:', event.message);
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
